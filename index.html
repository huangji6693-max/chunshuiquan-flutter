<!DOCTYPE html>
<html>
<head>
  <base href="/chunshuiquan-flutter/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="春水圈 — 遇见心动的 Ta">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF4D88">

  <!-- [fix] 禁用浏览器缓存, 让主人每次刷新都拿到最新代码 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="春水圈">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>春水圈</title>
  <link rel="manifest" href="manifest.json">

  <!-- 品牌加载画面 -->
  <style>
    body { margin: 0; background: #1A1016; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1A0E2E, #0F0A1A);
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #FF4D88, #FF6B9D);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(255,77,136,0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    #loading .logo svg { width: 40px; height: 40px; fill: white; }
    #loading .brand { color: white; font-size: 28px; font-weight: 800; letter-spacing: 6px; margin-top: 24px; font-family: system-ui; }
    #loading .tagline { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 3px; margin-top: 10px; font-family: system-ui; }
    #loading .dots { margin-top: 32px; display: flex; gap: 6px; }
    #loading .dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #FF4D88; opacity: 0.3;
      animation: dot 1.4s infinite ease-in-out;
    }
    #loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    #loading .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes dot { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <!-- 品牌加载画面（Flutter加载完后自动隐藏） -->
  <div id="loading">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <div class="brand">春水圈</div>
    <div class="tagline">遇见心动的 Ta</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <script>
    // [fix] 强制注销已安装的 service worker 并清空所有缓存
    // 解决 demo 期主人测试时拿到旧版本代码的问题
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        for (var i = 0; i < regs.length; i++) {
          regs[i].unregister();
        }
      });
    }
    if (window.caches) {
      caches.keys().then(function(names) {
        for (var i = 0; i < names.length; i++) {
          caches.delete(names[i]);
        }
      });
    }

    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('hidden'); setTimeout(function() { el.remove(); }, 500); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
